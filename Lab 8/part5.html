<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 8 - Part 5: Layout Switch with Mustache</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://unpkg.com/mustache@4.2.0/mustache.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .controls {
      margin-bottom: 20px;
    }

    input[type="text"] {
      padding: 8px;
      width: 260px;
    }

    button {
      padding: 8px 12px;
      margin: 5px 5px 5px 0;
      cursor: pointer;
    }

    #status {
      margin: 10px 0 15px 0;
      font-weight: bold;
    }

    /* flex container */
    #results {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: stretch;
    }

    /* common item style */
    .book {
      border: 1px solid #ccc;
      padding: 10px;
      box-sizing: border-box;
      background: #f9f9f9;
    }

    .book img {
      width: 100px;
      height: 150px;
      object-fit: contain;
      display: block;
      margin: 0 auto 10px auto;
      background: #fff;
    }

    .book h3 {
      font-size: 16px;
      margin: 8px 0;
    }

    .book p {
      font-size: 14px;
      margin: 5px 0;
    }

    /* Part 3 requirement: grid layout */
    .grid4 .book {
      width: 23%;
      text-align: center;
    }

    /* Part 3 requirement: flow list layout */
    .list .book {
      width: 100%;
      display: flex;
      gap: 15px;
      align-items: flex-start;
      text-align: left;
    }

    .list .book img {
      margin: 0;
      flex-shrink: 0;
    }

    .list .book-content {
      flex: 1;
    }

    /* Part 3 requirement: 3 items per row */
    .grid3 .book {
      width: 31%;
      text-align: center;
    }

    /* Part 3 requirement: first item occupies whole first row */
    .firstfull .book:first-child {
      width: 100% !important;
    }

    @media (max-width: 900px) {
      .grid4 .book,
      .grid3 .book {
        width: 48%;
      }
    }

    @media (max-width: 600px) {
      .grid4 .book,
      .grid3 .book,
      .list .book {
        width: 100%;
      }

      .list .book {
        flex-direction: column;
      }

      .list .book img {
        width: 100px;
      }
    }
  </style>
</head>
<body>

  <h1>Google Books Layout Switch Using Mustache</h1>

  <div class="controls">
    <input type="text" id="keyword" placeholder="Enter book keyword" value="javascript">
    <button id="searchBtn">Search</button>
    <br><br>
    <button id="flowBtn">Flow List</button>
    <button id="gridBtn">Grid Layout</button>
    <button id="grid3Btn">3 Items Per Row</button>
    <button id="firstBtn">First Item Full Row</button>
  </div>

  <div id="status"></div>
  <div id="results" class="grid4"></div>

  <!-- Mustache template -->
  <script id="bookTemplate" type="x-tmpl-mustache">
    {{#books}}
      <div class="book">
        <img src="{{image}}" alt="Book cover for {{title}}">
        <div class="book-content">
          <h3>{{title}}</h3>
          <p><strong>Author:</strong> {{authors}}</p>
          <p><strong>Publisher:</strong> {{publisher}}</p>
          <p>{{description}}</p>
        </div>
      </div>
    {{/books}}
  </script>

  <script>
    let booksData = [];
    let firstFullOn = false;

    function shortenText(text, maxLength) {
      if (!text) return "No description available.";
      return text.length > maxLength ? text.substring(0, maxLength) + "..." : text;
    }

    function renderBooks() {
      const template = document.getElementById("bookTemplate").innerHTML;
      const output = Mustache.render(template, { books: booksData });
      document.getElementById("results").innerHTML = output;

      if (firstFullOn) {
        document.getElementById("results").classList.add("firstfull");
      } else {
        document.getElementById("results").classList.remove("firstfull");
      }
    }

    function searchBooks() {
      const keyword = document.getElementById("keyword").value.trim();

      if (keyword === "") {
        document.getElementById("status").innerHTML = "Please enter a keyword.";
        document.getElementById("results").innerHTML = "";
        return;
      }

      document.getElementById("status").innerHTML = "Loading books...";
      document.getElementById("results").innerHTML = "";

      $.getJSON("https://www.googleapis.com/books/v1/volumes?q=" + encodeURIComponent(keyword))
        .done(function(data) {
          if (!data.items || data.items.length === 0) {
            booksData = [];
            document.getElementById("status").innerHTML = "No books found.";
            document.getElementById("results").innerHTML = "";
            return;
          }

          booksData = data.items.map(function(item) {
            const info = item.volumeInfo || {};

            return {
              title: info.title || "No Title",
              authors: info.authors ? info.authors.join(", ") : "Unknown Author",
              publisher: info.publisher || "Unknown Publisher",
              description: shortenText(info.description, 120),
              image: info.imageLinks && info.imageLinks.thumbnail
                ? info.imageLinks.thumbnail
                : "https://via.placeholder.com/100x150?text=No+Image"
            };
          });

          renderBooks();
          document.getElementById("status").innerHTML = booksData.length + " books loaded.";
        })
        .fail(function() {
          document.getElementById("status").innerHTML = "Error loading books.";
          document.getElementById("results").innerHTML = "";
        });
    }

    document.getElementById("searchBtn").addEventListener("click", searchBooks);

    document.getElementById("flowBtn").addEventListener("click", function() {
      const results = document.getElementById("results");
      results.classList.remove("grid4", "grid3");
      results.classList.add("list");
      renderBooks();
    });

    document.getElementById("gridBtn").addEventListener("click", function() {
      const results = document.getElementById("results");
      results.classList.remove("list", "grid3");
      results.classList.add("grid4");
      renderBooks();
    });

    document.getElementById("grid3Btn").addEventListener("click", function() {
      const results = document.getElementById("results");
      results.classList.remove("list", "grid4");
      results.classList.add("grid3");
      renderBooks();
    });

    document.getElementById("firstBtn").addEventListener("click", function() {
      firstFullOn = !firstFullOn;
      renderBooks();
    });

    searchBooks();
  </script>

</body>
</html>
