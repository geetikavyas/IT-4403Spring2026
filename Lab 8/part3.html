<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lab 8 - Part 3 (Layout Switch)</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .controls {
      margin-bottom: 20px;
    }

    input {
      padding: 8px;
      width: 250px;
    }

    button {
      padding: 8px 12px;
      margin: 5px 5px 5px 0;
      cursor: pointer;
    }

    /* container */
    #results {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    /* default item style */
    .book {
      border: 1px solid #ccc;
      padding: 10px;
      background: #f9f9f9;
      box-sizing: border-box;
    }

    .book img {
      width: 100px;
      height: 150px;
      object-fit: contain;
      display: block;
      margin: 0 auto 10px;
    }

    .book h3 {
      font-size: 16px;
      margin: 8px 0;
      text-align: center;
    }

    .book p {
      font-size: 14px;
      margin: 5px 0;
    }

    /* grid: 4 per row */
    .grid4 .book {
      width: 23%;
      text-align: center;
    }

    /* flow list */
    .list .book {
      width: 100%;
      display: flex;
      align-items: flex-start;
      gap: 15px;
      text-align: left;
    }

    .list .book img {
      margin: 0;
      flex-shrink: 0;
    }

    .list .book-content {
      flex: 1;
    }

    /* grid: 3 per row */
    .grid3 .book {
      width: 31%;
      text-align: center;
    }

    /* first item takes whole first row */
    .firstfull .book:first-child {
      width: 100% !important;
    }
  </style>
</head>
<body>

  <h1>Google Books Layout Switch</h1>

  <div class="controls">
    <input type="text" id="keyword" placeholder="Enter keyword" value="javascript">
    <button onclick="searchBooks()">Search</button>
    <br><br>

    <button onclick="setFlowList()">Flow List</button>
    <button onclick="setGrid4()">Grid Layout</button>
    <button onclick="setGrid3()">3 Items Per Row</button>
    <button onclick="toggleFirstFull()">First Item Full Row</button>
  </div>

  <div id="results" class="grid4"></div>

  <script>
    let firstFullOn = false;

    function searchBooks() {
      let keyword = document.getElementById("keyword").value.trim();

      if (keyword === "") {
        $("#results").html("Please enter a keyword.");
        return;
      }

      $("#results").html("Loading...");

      $.getJSON("https://www.googleapis.com/books/v1/volumes?q=" + encodeURIComponent(keyword), function(data) {
        let output = "";

        if (!data.items) {
          $("#results").html("No results found.");
          return;
        }

        data.items.forEach(function(item) {
          let book = item.volumeInfo;

          let title = book.title || "No Title";
          let authors = book.authors ? book.authors.join(", ") : "Unknown Author";
          let image = book.imageLinks ? book.imageLinks.thumbnail : "https://via.placeholder.com/100x150";
          let description = book.description ? book.description.substring(0, 120) + "..." : "No description available.";

          output += `
            <div class="book">
              <img src="${image}" alt="Book cover for ${title}">
              <div class="book-content">
                <h3>${title}</h3>
                <p><strong>Author:</strong> ${authors}</p>
                <p>${description}</p>
              </div>
            </div>
          `;
        });

        $("#results").html(output);

        if (firstFullOn) {
          $("#results").addClass("firstfull");
        }
      });
    }

    function setFlowList() {
      $("#results").removeClass("grid4 grid3").addClass("list");
      if (firstFullOn) {
        $("#results").addClass("firstfull");
      }
    }

    function setGrid4() {
      $("#results").removeClass("list grid3").addClass("grid4");
      if (firstFullOn) {
        $("#results").addClass("firstfull");
      }
    }

    function setGrid3() {
      $("#results").removeClass("list grid4").addClass("grid3");
      if (firstFullOn) {
        $("#results").addClass("firstfull");
      }
    }

    function toggleFirstFull() {
      firstFullOn = !firstFullOn;

      if (firstFullOn) {
        $("#results").addClass("firstfull");
      } else {
        $("#results").removeClass("firstfull");
      }
    }

    // auto load when page opens
    searchBooks();
  </script>

</body>
</html>
