<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IT 4403 Lab 10 - Bootstrap</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .box {
      background-color: #dbeafe;
      border: 2px solid #0d6efd;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .small-box {
      min-height: 60px;
    }
  </style>
</head>
<body>
  <div class="container my-4">
    <h1 class="mb-4">Lab 10: Bootstrap</h1>

    <!-- Layout 1 -->
    <h3>Layout 1</h3>
    <div class="row mb-4">
      <div class="col-4 box">Left</div>
      <div class="col-8 box">Right</div>
    </div>

    <!-- Layout 2 -->
    <h3>Layout 2</h3>
    <div class="row mb-4">
      <div class="col-2 box">Left</div>
      <div class="col-8 box">Center</div>
      <div class="col-2 box">Right</div>
    </div>

    <!-- Layout 3 -->
    <h3>Layout 3</h3>
    <div class="row mb-1">
      <div class="col-12 box small-box">Header</div>
    </div>
    <div class="row mb-4">
      <div class="col-4 box">Left</div>
      <div class="col-8 box">Right</div>
    </div>

    <!-- Layout 4 -->
    <h3>Layout 4</h3>
    <div class="row mb-1">
      <div class="col-12 box small-box">Header</div>
    </div>
    <div class="row mb-4">
      <div class="col-2 box">Left</div>
      <div class="col-8 box">Center</div>
      <div class="col-2 box">Right</div>
    </div>

    <!-- Layout 5 -->
    <h3>Layout 5</h3>
    <div class="row mb-1">
      <div class="col-12 box small-box">Top</div>
    </div>
    <div class="row mb-4">
      <div class="col-3 box">Left</div>
      <div class="col-9 box">Right</div>
    </div>
    <h3>Layout 6: Column Drop Pattern</h3>

    <div class="row mb-4">
     <!-- Top row (3 columns on large screens) -->
     <div class="col-lg-4 col-md-6 box">Column 1</div>
     <div class="col-lg-4 col-md-6 box">Column 2</div>
     <div class="col-lg-4 col-md-12 box">Column 3</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
