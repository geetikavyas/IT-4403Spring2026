<!DOCTYPE html>
<html>
<head>
    <title>Products (CORS)</title>
    <script src="https://code.jquery.com/jquery-3.1.1.min.js"></script>
</head>
<body>

<h1>Product List</h1>
<button id="btnLoad">Load Products</button>

<div id="result"></div>

<script>
$("#btnLoad").click(function () {
    $.getJSON("https://dummyjson.com/products", function (data) {

        $("#result").html("");

        $.each(data.products, function(index, item) {
            $("#result").append(item.title + "<br>");
        });

    });
});
</script>

</body>
</html>
