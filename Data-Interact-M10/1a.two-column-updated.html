<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Two Columns - Open Library</title>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/2.3.0/mustache.min.js"></script>

    <script id="booklisttemplate" type="text/template">
        {{#books}}
        <div class="booklistitem" data-key="{{key}}">
            <img src="{{coverSmall}}" width="50" /> {{title}}
        </div>
        {{/books}}
    </script>

    <script id="bookdetailstemplate" type="text/template">
        <h2>{{title}}</h2>
        <img src="{{coverLarge}}" style="float:left" />
        <div style="margin-left:220px">
            <br>By {{author}} - {{year}}
            <h4>Details</h4>
            <div>{{description}}</div>
            <p><a href="{{link}}" target="_blank">More Information on Open Library</a></p>
        </div>
        <div style="clear:both"></div>
    </script>

    <script>
    var currentBooks = [];

    $(document).ready(function () {
        $("#btnSearch").click(function () {
            var term = $("#searchTerm").val().trim();
            searchBooks(term);
        });
    });

    function normalizeBooks(docs, max) {
        return docs.slice(0, max).map(function(book) {
            return {
                key: book.key || "",
                title: book.title || "No title",
                author: (book.author_name && book.author_name.length > 0) ? book.author_name[0] : "Unknown author",
                year: book.first_publish_year || "N/A",
                description: (book.first_sentence && book.first_sentence.length > 0)
                    ? book.first_sentence[0]
                    : "No description available.",
                coverSmall: book.cover_i
                    ? "https://covers.openlibrary.org/b/id/" + book.cover_i + "-S.jpg"
                    : "https://via.placeholder.com/50x75?text=No+Image",
                coverLarge: book.cover_i
                    ? "https://covers.openlibrary.org/b/id/" + book.cover_i + "-M.jpg"
                    : "https://via.placeholder.com/180x260?text=No+Image",
                link: book.key ? "https://openlibrary.org" + book.key : "https://openlibrary.org"
            };
        });
    }

    function searchBooks(term) {
        $("#booklist").html("<p>Searching...</p>");
        $("#bookdetails").html("");

        $.getJSON("https://openlibrary.org/search.json?q=" + encodeURIComponent(term), function (data) {
            currentBooks = normalizeBooks(data.docs || [], 12);

            if (currentBooks.length === 0) {
                $("#booklist").html("<p>No results found.</p>");
                return;
            }

            var template = $("#booklisttemplate").html();
            var html = Mustache.render(template, { books: currentBooks });
            $("#booklist").html(html);

            $(".booklistitem").on("click", function () {
                getBookDetails($(this).attr("data-key"));
            });
        }).fail(function () {
            $("#booklist").html("<p>Error loading data.</p>");
        });
    }

    function getBookDetails(bookKey) {
        var selected = currentBooks.find(function(book) {
            return book.key === bookKey;
        });

        if (selected) {
            var template = $("#bookdetailstemplate").html();
            var html = Mustache.render(template, selected);
            $("#bookdetails").html(html);
        }
    }
    </script>

    <style>
        #header {
            background-color: #66ddee;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 5px;
        }

        #maincontent {
            display: flex;
            margin-top: 140px;
        }

        #booklist {
            width: 45%;
        }

        #bookdetails {
            width: 52%;
            padding: 20px;
        }

        .booklistitem {
            border: thin solid gray;
            cursor: pointer;
            margin: 1px;
            width: 98%;
            padding: 4px;
        }

        .booklistitem:hover {
            background-color: yellow;
        }

        .description-box {
            margin: 10px 0 15px 0;
            padding: 10px 12px;
            background-color: #f4f8fb;
            border-left: 5px solid #4a90e2;
            font-family: Arial, sans-serif;
            line-height: 1.4;
        }
    </style>
</head>

<body>
<div id="header">
    <div class="description-box">
        <strong>About this demo:</strong> This page demonstrates a two-column layout where search results appear on the left and the selected book’s details appear on the right.
    </div>

    <h1>Book Search</h1>
    <input type="text" id="searchTerm" value="mobile web" />
    <input type="button" id="btnSearch" value="Search" />
</div>

<div id="maincontent">
    <div id="booklist"></div>
    <div id="bookdetails"></div>
</div>
</body>
</html>
