<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Data Details UI: Inline Expansion - Open Library</title>

    <script type="text/javascript" src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/2.3.0/mustache.min.js"></script>

    <script id="booklisttemplate" type="text/template">
        {{#books}}
        <div class="booklistitem" data-bookkey="{{key}}">
            <div class="booklistitemheader" data-bookkey="{{key}}">
                <img src="{{coverSmall}}" width="50" height="75" /> {{title}}
            </div>
            <div class="bookdetails" style="display:none"></div>
        </div>
        {{/books}}
    </script>

    <script id="bookdetailstemplate" type="text/template">
        <h2>{{title}}</h2>
        <img src="{{coverLarge}}" style="float: left; margin-right: 15px;" />
        <div style="margin-left: 220px">
            <br> By {{author}} - {{year}}
            <h4>Description</h4>
            <div>{{description}}</div>
            <p><a href="{{link}}" target="_blank">More Information on Open Library</a></p>
        </div>
        <div style="clear:both"></div>
    </script>

    <script type="text/javascript">
    var currentBooks = [];

    $(document).ready(function ()
    {
        $("#btnSearch").click(function ()
        {
            var term = $("#searchTerm").val().trim();

            if (term === "")
            {
                $("#booklist").html("<p>Please enter a search term.</p>");
                return;
            }

            searchBooks(term);
        });
    });

    function normalizeBooks(docs, max)
    {
        return docs.slice(0, max).map(function(book)
        {
            return {
                key: book.key || "",
                title: book.title || "No title",
                author: (book.author_name && book.author_name.length > 0)
                    ? book.author_name[0]
                    : "Unknown author",
                year: book.first_publish_year || "N/A",
                description: "Description not available in search results.",
                coverSmall: book.cover_i
                    ? "https://covers.openlibrary.org/b/id/" + book.cover_i + "-S.jpg"
                    : "https://via.placeholder.com/50x75?text=No+Image",
                coverLarge: book.cover_i
                    ? "https://covers.openlibrary.org/b/id/" + book.cover_i + "-M.jpg"
                    : "https://via.placeholder.com/180x260?text=No+Image",
                link: book.key
                    ? "https://openlibrary.org" + book.key
                    : "https://openlibrary.org"
            };
        });
    }

    function searchBooks(term)
    {
        $("#booklist").html("<p>Searching...</p>");

        var serviceUrl = "https://openlibrary.org/search.json?q=" + encodeURIComponent(term);

        $.ajax({
            url: serviceUrl,
            method: "GET",
            dataType: "json",
            success: function (searchResultsJson)
            {
                currentBooks = normalizeBooks(searchResultsJson.docs || [], 12);

                if (currentBooks.length === 0)
                {
                    $("#booklist").html("<p>No results found.</p>");
                    return;
                }

                var template = $("#booklisttemplate").html();
                var html = Mustache.render(template, { books: currentBooks });
                $("#booklist").html(html);

                $(".booklistitemheader").on("click", function ()
                {
                    var div = $(this).next();
                    var bookKey = $(this).attr("data-bookkey");
                    getBookDetails(bookKey, div);
                });
            },
            error: function ()
            {
                $("#booklist").html("<p>Error loading data.</p>");
            }
        });
    }

    function getBookDetails(bookKey, div)
    {
        var selectedBook = currentBooks.find(function(book)
        {
            return book.key === bookKey;
        });

        if (selectedBook)
        {
            var template = $("#bookdetailstemplate").html();
            var html = Mustache.render(template, selectedBook);
            $(div).html(html);
            $(div).slideToggle();
        }
    }
    </script>

    <style>
        body
        {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        #header
        {
            background-color: #97E300;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 5px;
            z-index: 1000;
        }

        #maincontent
        {
            margin-top: 140px;
            padding: 10px;
        }

        .booklistitem
        {
            border: thin solid gray;
            background-color: #F2FFE5;
            margin: 1px;
        }

        .booklistitemheader
        {
            cursor: pointer;
            padding: 6px;
        }

        .booklistitemheader:hover
        {
            background-color: #8CFF1A;
        }

        .bookdetails
        {
            border: thin solid #66ddee;
            padding: 10px;
            margin: 10px;
            background-color: white;
        }

        .description-box
        {
            margin: 10px 0 15px 0;
            padding: 10px 12px;
            background-color: #f4f8fb;
            border-left: 5px solid #4a90e2;
            font-family: Arial, sans-serif;
            line-height: 1.4;
        }
    </style>
</head>

<body>
<div id="header">
    <div class="description-box"><strong>About this demo:</strong> This page demonstrates inline expansion where clicking a book row reveals that book’s details directly underneath the selected item.</div>

    <h1>Book Search</h1>
    <input type="text" id="searchTerm" value="Data Visualization" />
    <input type="button" id="btnSearch" value="Search" />
</div>

<div id="maincontent">
    <div id="booklist"></div>
</div>
</body>
</html>
