<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>load more data 2: button clicking - Open Library</title>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script type="text/javascript">
    $(document).ready(function ()
    {
        var resultspage = 1;

        $("#btnSearch").click(function ()
        {
            $("#results").html("");
            resultspage = 1;
            loadBooks(resultspage);
        });

        $("#btnMore").click(function ()
        {
            resultspage++;
            loadBooks(resultspage);
        });

        function loadBooks(page)
        {
            var term = $("#searchTerm").val().trim();

            if (term === "")
            {
                $("#results").html("<p>Please enter a search term.</p>");
                return;
            }

            var url = "https://openlibrary.org/search.json?q=" +
                      encodeURIComponent(term) +
                      "&page=" + page;

            $.ajax({
                url: url,
                method: "GET",
                dataType: "json",
                success: function (jsonData)
                {
                    var docs = (jsonData.docs || []).slice(0, 10);

                    if (docs.length === 0)
                    {
                        if (page === 1)
                        {
                            $("#results").html("<p>No results found.</p>");
                        }
                        else
                        {
                            $("#results").append("<p>No more results.</p>");
                        }
                        return;
                    }

                    for (var i = 0; i < docs.length; i++)
                    {
                        var title = docs[i].title || "No title";
                        var thumbnail = docs[i].cover_i
                            ? "https://covers.openlibrary.org/b/id/" + docs[i].cover_i + "-M.jpg"
                            : "https://via.placeholder.com/100x120?text=No+Image";

                        var bookdiv = "<div class='book'>";
                        bookdiv += "<img src='" + thumbnail + "' width='100' height='120' />";
                        bookdiv += "<div class='booktitle'>" + title + "</div>";
                        bookdiv += "</div>";

                        $("#results").append(bookdiv);
                    }
                },
                error: function ()
                {
                    $("#results").append("<p>Error loading data.</p>");
                }
            });
        }
    });
    </script>

    <style>
        #results
        {
            display: flex;
            flex-wrap: wrap;
            width: 1100px;
        }

        .book
        {
            border: thin solid blue;
            margin: 4px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            width: 120px;
            padding: 6px;
            box-sizing: border-box;
            background: white;
        }

        .booktitle
        {
            width: 100%;
            text-align: center;
            font-size: 13px;
            margin-top: 6px;
        }

        .description-box
        {
            margin: 10px 0 15px 0;
            padding: 10px 12px;
            background-color: #f4f8fb;
            border-left: 5px solid #4a90e2;
            font-family: Arial, sans-serif;
            line-height: 1.4;
        }
    </style>
</head>

<body>
<div class="description-box"><strong>About this demo:</strong> This page demonstrates a Load More button that fetches and appends additional search results without replacing the existing ones.</div>

    <h1>Load more data by clicking</h1>
    <input type="text" id="searchTerm" value="javascript" />
    <input type="button" id="btnSearch" value="Search" />
    <div id="results"></div>
    <input type="button" id="btnMore" value="Load More" />
</body>
</html>
