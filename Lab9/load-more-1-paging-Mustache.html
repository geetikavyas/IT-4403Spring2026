<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Load more data 1: paging - Open Library + Mustache</title>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/2.3.0/mustache.min.js"></script>

    <!-- Search Results Template -->
    <script id="book-template" type="text/template">
        {{#books}}
            <img class="bookicon"
                 data-title="{{title}}"
                 data-author="{{author}}"
                 data-year="{{year}}"
                 src="{{cover}}"
                 width="80"
                 title="{{title}}" />
        {{/books}}
    </script>

    <!-- Selected Book Template -->
    <script id="details-template" type="text/template">
        <h2>{{title}}</h2>
        <p><strong>Author:</strong> {{author}}</p>
        <p><strong>First Published:</strong> {{year}}</p>
    </script>

    <script type="text/javascript">
    $(document).ready(function ()
    {
        $("#button1").click(function ()
        {
            var term = $("#searchTerm").val().trim();

            if (term === "")
            {
                $("#books").html("<p>Please enter a search term.</p>");
                $("#book").html("");
                return;
            }

            searchBooks(term, 1);

            $("#pages").html("Pages: ");
            for (var i = 1; i <= 5; i++)
            {
                $("#pages").append("<a class='page' href='#'>" + i + "</a> ");
            }
        });

        $("#pages").on("click", ".page", function (event)
        {
            event.preventDefault();
            var page = parseInt($(this).text());
            var term = $("#searchTerm").val().trim();
            searchBooks(term, page);
        });
    });

    function searchBooks(term, page)
    {
        $("#books").html("<p>Searching...</p>");
        $("#book").html("");

        var servicePoint =
            "https://openlibrary.org/search.json?q=" +
            encodeURIComponent(term) +
            "&page=" + page;

        $.ajax({
            url: servicePoint,
            method: "GET",
            dataType: "json",
            success: function (jsonData)
            {
                $("#books").html("<p>Page " + page + "</p>");

                var docs = (jsonData.docs || []).slice(0, 10);

                if (docs.length === 0)
                {
                    $("#books").append("<p>No results found.</p>");
                    return;
                }

                var books = docs.map(function (book)
                {
                    return {
                        title: escapeHtml(book.title || "No title"),
                        author: escapeHtml(
                            (book.author_name && book.author_name.length > 0)
                                ? book.author_name[0]
                                : "Unknown author"
                        ),
                        year: escapeHtml(String(book.first_publish_year || "N/A")),
                        cover: book.cover_i
                            ? "https://covers.openlibrary.org/b/id/" + book.cover_i + "-M.jpg"
                            : "https://via.placeholder.com/80x120?text=No+Image"
                    };
                });

                var template = $("#book-template").html();
                var html = Mustache.render(template, { books: books });
                $("#books").append(html);

                $(".bookicon").on("click", function ()
                {
                    var details = {
                        title: $(this).attr("data-title"),
                        author: $(this).attr("data-author"),
                        year: $(this).attr("data-year")
                    };

                    var detailsTemplate = $("#details-template").html();
                    var detailsHtml = Mustache.render(detailsTemplate, details);
                    $("#book").html(detailsHtml);
                });
            },
            error: function ()
            {
                $("#books").html("<p>Error loading data.</p>");
            }
        });
    }

    function escapeHtml(text)
    {
        return text
            .replace(/&/g, "&amp;")
            .replace(/"/g, "&quot;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }
    </script>

    <style>
        .bookicon {
            vertical-align: top;
            margin: 1px;
        }

        .bookicon:hover {
            width: 100px;
            cursor: pointer;
            margin: 0 -10px 0 -10px;
            border: 1px solid blue;
            z-index: 9999;
            position: relative;
        }

        .page {
            border: thin solid blue;
            padding: 10px;
            text-decoration: none;
            margin-right: 5px;
        }

        .description-box {
            margin: 10px 0 15px 0;
            padding: 10px 12px;
            background-color: #f4f8fb;
            border-left: 5px solid #4a90e2;
            font-family: Arial, sans-serif;
            line-height: 1.4;
        }
    </style>
</head>

<body>
<div class="description-box">
    <strong>About this demo:</strong> This page demonstrates pagination where users can move through multiple result pages by clicking page numbers.
</div>

<h1>Load more data through pagination</h1>
<input type="text" id="searchTerm" value="mobile web" />
<input type="button" id="button1" value="Search" />
<span id="pages"></span>

<h4>Search Results</h4>
<div id="books"></div>

<h4>Selected Book</h4>
<div id="book" style="width: 800px; max-height: 100px"></div>
</body>
</html>
