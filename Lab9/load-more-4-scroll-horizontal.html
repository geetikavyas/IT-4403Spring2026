<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Load more data 3: horizontal slideshow - Open Library</title>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>

    <script type="text/javascript">
    $(document).ready(function ()
    {
        var currentPage = 1;
        var totalPages = 0;
        var maxPages = 4;
        var slideWidth = 1100;

        $("#btnSearch").click(function ()
        {
            var term = $("#searchTerm").val().trim();

            if (term === "")
            {
                $("#results").html("<p>Please enter a search term.</p>");
                $("#pageinfo").html("");
                return;
            }

            $("#results").html("");
            currentPage = 1;
            totalPages = 0;
            loadAllPages(term);
        });

        function loadAllPages(term)
        {
            for (let page = 1; page <= maxPages; page++)
            {
                loadBooks(term, page);
            }
        }

        function loadBooks(term, page)
        {
            var url = "https://openlibrary.org/search.json?q=" +
                      encodeURIComponent(term) +
                      "&page=" + page;

            $.ajax({
                url: url,
                method: "GET",
                dataType: "json",
                success: function (jsonData)
                {
                    var docs = (jsonData.docs || []).slice(0, 10);

                    if (docs.length === 0)
                    {
                        return;
                    }

                    totalPages++;

                    var pageDiv = "<div class='slidepage'>";

                    for (var i = 0; i < docs.length; i++)
                    {
                        var title = docs[i].title || "No title";
                        var thumbnail = docs[i].cover_i
                            ? "https://covers.openlibrary.org/b/id/" + docs[i].cover_i + "-M.jpg"
                            : "https://via.placeholder.com/100x120?text=No+Image";

                        pageDiv += "<div class='book'>";
                        pageDiv += "<img src='" + thumbnail + "' width='100' height='120' />";
                        pageDiv += "<div class='book-title'>" + title + "</div>";
                        pageDiv += "</div>";
                    }

                    pageDiv += "</div>";
                    $("#results").append(pageDiv);

                    $("#pageinfo").html("(" + currentPage + "/" + totalPages + ")");
                },
                error: function ()
                {
                    $("#results").append("<p>Error loading results.</p>");
                }
            });
        }

        $("#btnPrev").click(function ()
        {
            if (currentPage > 1)
            {
                currentPage--;
                var newMargin = "-" + ((currentPage - 1) * slideWidth) + "px";
                $("#results").animate({ marginLeft: newMargin });
                $("#pageinfo").html("(" + currentPage + "/" + totalPages + ")");
            }
        });

        $("#btnNext").click(function ()
        {
            if (currentPage < totalPages)
            {
                currentPage++;
                var newMargin = "-" + ((currentPage - 1) * slideWidth) + "px";
                $("#results").animate({ marginLeft: newMargin });
                $("#pageinfo").html("(" + currentPage + "/" + totalPages + ")");
            }
        });
    });
    </script>

    <style>
        body
        {
            font-family: Arial, sans-serif;
        }

        .description-box
        {
            margin: 10px 0 15px 0;
            padding: 10px 12px;
            background-color: #f4f8fb;
            border-left: 5px solid #4a90e2;
            line-height: 1.4;
        }

        #viewport
        {
            width: 1100px;
            height: 185px;
            overflow: hidden;
            border: thin solid red;
        }

        #results
        {
            display: flex;
            flex-wrap: nowrap;
            width: max-content;
            margin: 0;
        }

        .slidepage
        {
            width: 1100px;
            display: flex;
            flex-wrap: wrap;
        }

        .book
        {
            border: thin solid blue;
            margin: 4px;
            width: 100px;
            padding: 6px;
            text-align: center;
            box-sizing: border-box;
            background: white;
        }

        .book-title
        {
            font-size: 12px;
            margin-top: 6px;
        }

        #controls
        {
            margin-top: 10px;
        }
    </style>
</head>

<body>
<div class="description-box">
    <strong>About this demo:</strong> This page demonstrates a horizontal slideshow where result pages are browsed left and right, with paging shown as (current/total).
</div>

<h1>Load more data with horizontal slideshow</h1>
<input type="text" id="searchTerm" value="web api" />
<input type="button" id="btnSearch" value="Search" />

<div id="viewport">
    <div id="results"></div>
</div>

<div id="controls">
    <input type="button" id="btnPrev" value="< Move Prev" />
    <span id="pageinfo"></span>
    <input type="button" id="btnNext" value="Move Next >" />
</div>
</body>
</html>
