<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 8 - Part 4: Open Library with Mustache</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://unpkg.com/mustache@4.2.0/mustache.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .controls {
      margin-bottom: 20px;
    }

    input[type="text"] {
      padding: 8px;
      width: 260px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    #status {
      margin: 10px 0 15px 0;
      font-weight: bold;
    }

    /* Flexbox grid container */
    #results {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    /* Each book card */
    .book {
      width: 23%;
      border: 1px solid #ccc;
      padding: 10px;
      box-sizing: border-box;
      background: #f9f9f9;
      text-align: center;
    }

    .book img {
      width: 100px;
      height: 150px;
      object-fit: contain;
      display: block;
      margin: 0 auto 10px auto;
      background: #fff;
    }

    .book h3 {
      font-size: 16px;
      margin: 8px 0;
    }

    .book p {
      font-size: 14px;
      margin: 5px 0;
    }

    @media (max-width: 900px) {
      .book {
        width: 48%;
      }
    }

    @media (max-width: 600px) {
      .book {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <h1>Search Books Using Mustache Template</h1>

  <div class="controls">
    <input type="text" id="keyword" placeholder="Enter book keyword" value="javascript">
    <button id="searchBtn">Search</button>
  </div>

  <div id="status"></div>
  <div id="results"></div>

  <!-- Mustache template -->
  <script id="bookTemplate" type="x-tmpl-mustache">
    {{#books}}
      <div class="book">
        <img src="{{image}}" alt="Book cover for {{title}}">
        <h3>{{title}}</h3>
        <p><strong>Author:</strong> {{authors}}</p>
        <p><strong>First Published:</strong> {{publisher}}</p>
      </div>
    {{/books}}
  </script>

  <script>
    function searchBooks() {
      const keyword = document.getElementById("keyword").value.trim();

      if (keyword === "") {
        document.getElementById("status").innerHTML = "Please enter a keyword.";
        document.getElementById("results").innerHTML = "";
        return;
      }

      document.getElementById("status").innerHTML = "Loading books...";
      document.getElementById("results").innerHTML = "";

      $.getJSON("https://openlibrary.org/search.json?q=" + encodeURIComponent(keyword))
        .done(function(data) {
          if (!data.docs || data.docs.length === 0) {
            document.getElementById("status").innerHTML = "No books found.";
            document.getElementById("results").innerHTML = "";
            return;
          }

          const booksData = data.docs.slice(0, 20).map(function(book) {
            return {
              title: book.title || "No Title",
              authors: book.author_name ? book.author_name.join(", ") : "Unknown Author",
              publisher: book.first_publish_year || "Unknown",
              image: book.cover_i
                ? "https://covers.openlibrary.org/b/id/" + book.cover_i + "-M.jpg"
                : "https://via.placeholder.com/100x150?text=No+Image"
            };
          });

          const template = document.getElementById("bookTemplate").innerHTML;
          const output = Mustache.render(template, { books: booksData });

          document.getElementById("status").innerHTML = booksData.length + " books loaded.";
          document.getElementById("results").innerHTML = output;
        })
        .fail(function() {
          document.getElementById("status").innerHTML = "Error loading books.";
          document.getElementById("results").innerHTML = "";
        });
    }

    document.getElementById("searchBtn").addEventListener("click", searchBooks);

    // Load some books when page opens
    searchBooks();
  </script>

</body>
</html>
