<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lab 8 - Part 6 (Search + Template Switch)</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://unpkg.com/mustache@4.2.0/mustache.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
    }

    .controls {
      margin-bottom: 20px;
    }

    input {
      padding: 8px;
      width: 250px;
    }

    button {
      padding: 8px 12px;
      margin-right: 8px;
      cursor: pointer;
    }

    #output {
      border: 1px solid #ccc;
      padding: 15px;
      max-width: 700px;
      background: #f9f9f9;
    }

    /* View 1 */
    .card-view img {
      width: 150px;
      display: block;
      margin-bottom: 10px;
    }

    /* View 2 */
    .compact-view {
      display: flex;
      gap: 15px;
    }

    .compact-view img {
      width: 120px;
    }
  </style>
</head>

<body>

<h1>Single Book View Switch (With Search)</h1>

<div class="controls">
  <input type="text" id="keyword" value="javascript">
  <button onclick="searchBook()">Search</button>
  <br><br>
  <button onclick="showCard()">Card View</button>
  <button onclick="showCompact()">Compact View</button>
</div>

<div id="output">Search a book to display...</div>

<!-- Template 1 -->
<script id="cardTemplate" type="x-tmpl-mustache">
  <div class="card-view">
    <img src="{{image}}">
    <h2>{{title}}</h2>
    <p><b>Author:</b> {{authors}}</p>
    <p><b>Publisher:</b> {{publisher}}</p>
    <p>{{description}}</p>
  </div>
</script>

<!-- Template 2 -->
<script id="compactTemplate" type="x-tmpl-mustache">
  <div class="compact-view">
    <img src="{{image}}">
    <div>
      <h2>{{title}}</h2>
      <p><b>Author:</b> {{authors}}</p>
      <p><b>Publisher:</b> {{publisher}}</p>
    </div>
  </div>
</script>

<script>
let currentBook = {};
let currentView = "card";

/* 🔍 SEARCH FUNCTION */
function searchBook() {
  let keyword = document.getElementById("keyword").value;

  $("#output").html("Loading...");

  $.getJSON("https://www.googleapis.com/books/v1/volumes?q=" + keyword, function(data) {

    if (!data.items || data.items.length === 0) {
      $("#output").html("No results found.");
      return;
    }

    let book = data.items[0].volumeInfo;

    currentBook = {
      title: book.title || "No Title",
      authors: book.authors ? book.authors.join(", ") : "Unknown",
      publisher: book.publisher || "Unknown",
      description: book.description ? book.description.substring(0,150) + "..." : "No description",
      image: book.imageLinks && book.imageLinks.thumbnail
        ? book.imageLinks.thumbnail
        : "https://via.placeholder.com/120x180?text=No+Image"
    };

    render();
  });
}

/* 🔄 RENDER FUNCTION */
function render() {
  let templateId = currentView === "card" ? "cardTemplate" : "compactTemplate";
  let template = document.getElementById(templateId).innerHTML;
  let html = Mustache.render(template, currentBook);

  document.getElementById("output").innerHTML = html;
}

/* BUTTONS */
function showCard() {
  currentView = "card";
  render();
}

function showCompact() {
  currentView = "compact";
  render();
}

/* AUTO LOAD */
searchBook();
</script>

</body>
</html>
